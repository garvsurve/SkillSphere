# ─── Server ───────────────────────────────────────────────
server.port=8085

# ─── PostgreSQL DataSource ─────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:2004/SkillSphere
spring.datasource.username=postgres
spring.datasource.password=Hellolala@
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────
# 'create' → drops and recreates tables, wiping the DB clean
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Logging ───────────────────────────────────────────────
logging.level.com.skillsphere=DEBUG

# ─── Suppress open-in-view warning ────────────────────────
spring.jpa.open-in-view=false

# ─── JWT Configuration ─────────────────────────────────────
# Replace with a strong secret in production
skillsphere.jwt.secret=aVeryLongAndSecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
skillsphere.jwt.expirationMs=3600000
