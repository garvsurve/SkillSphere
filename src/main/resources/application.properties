# ─── Server ───────────────────────────────────────────────
server.port=${PORT:8085}

# ─── PostgreSQL DataSource ─────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:2004/SkillSphere}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_db_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────
# 'create' → drops and recreates tables, wiping the DB clean
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Logging ───────────────────────────────────────────────
logging.level.com.skillsphere=DEBUG

# ─── Suppress open-in-view warning ────────────────────────
spring.jpa.open-in-view=false

# ─── JWT Configuration ─────────────────────────────────────
# Replace with a strong secret in production
skillsphere.jwt.secret=${JWT_SECRET:aVeryLongAndSecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
skillsphere.jwt.expirationMs=3600000

# ─── External APIs ─────────────────────────────────────────
skillsphere.gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}
skillsphere.gemini.api.key.backup=${GEMINI_API_KEY_BACKUP:your_backup_gemini_api_key_here}

# ─── GitHub OAuth ──────────────────────────────────────────
github.client.id=${GITHUB_CLIENT_ID:your_github_client_id_here}
github.client.secret=${GITHUB_CLIENT_SECRET:your_github_client_secret_here}
